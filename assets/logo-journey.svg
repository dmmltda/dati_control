<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 44" fill="none">
  <defs>
    <linearGradient id="iconGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3ECF8E"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3ECF8E"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
  </defs>
  <!-- Icon: stylized path/route arrows -->
  <g transform="translate(2, 6)">
    <!-- Bottom arc path -->
    <path d="M4 24 C4 24 4 32 12 32 L24 32 C32 32 32 24 32 24" 
          stroke="url(#iconGrad)" stroke-width="3.5" stroke-linecap="round" fill="none"/>
    <!-- Top S-curve path -->
    <path d="M4 8 C4 8 4 16 12 16 L20 16 C28 16 28 8 32 8" 
          stroke="url(#iconGrad)" stroke-width="3.5" stroke-linecap="round" fill="none"/>
    <!-- Arrow head -->
    <path d="M28 4 L32 8 L28 12" 
          stroke="url(#iconGrad)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>
  <!-- Text: Journey -->
  <text x="46" y="30" 
        font-family="'Plus Jakarta Sans', 'DM Sans', sans-serif"
        font-size="22" font-weight="700" 
        fill="url(#textGrad)">Journey</text>
</svg>
